name: Apply website logo

on:
  push:
    paths:
      - .github/workflows/apply-website-logo.yml

permissions:
  contents: write

jobs:
  apply-logo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore compact site and add logo
        shell: bash
        run: |
          set -euo pipefail
          git show eaf62a330721c7bab6e5d4dddcd2f7a2ffcdb5a6:index.html > index.html
          git show eaf62a330721c7bab6e5d4dddcd2f7a2ffcdb5a6:styles.css > styles.css
          base64 --decode .logo-update/logo.b64 > holidaylawyer-logo.jpg

          python <<'PY'
          from pathlib import Path
          import re

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          html = html.replace(
              '<link rel="stylesheet" href="styles.css" />',
              '<link rel="stylesheet" href="styles.css" />\n  <link rel="icon" type="image/jpeg" href="holidaylawyer-logo.jpg" />'
          )
          html = html.replace(
              '<span class="brand-mark">HL</span>',
              '<img class="brand-logo" src="holidaylawyer-logo.jpg" alt="" aria-hidden="true" />'
          )
          html = html.replace(
              '<div class="page-title">\n          <span class="quiet-label">About</span>',
              '<div class="page-title about-title">\n          <img class="about-logo" src="holidaylawyer-logo.jpg" alt="HolidayLawyer.ai logo" />\n          <span class="quiet-label">About</span>'
          )
          index.write_text(html, encoding='utf-8')

          styles = Path('styles.css')
          css = styles.read_text(encoding='utf-8')
          css = re.sub(
              r'\.brand-mark \{.*?\}\n',
              '''.brand-logo {
            width: 42px;
            height: 42px;
            object-fit: cover;
            border: 1px solid var(--line);
            border-radius: 13px;
            background: #fff;
            box-shadow: 0 6px 16px rgba(29, 52, 88, .08);
          }
          ''',
              css,
              count=1,
              flags=re.S,
          )
          css += '''
          .about-title {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
          }
          .about-logo {
            width: 92px;
            height: 92px;
            margin-bottom: 16px;
            object-fit: cover;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: #fff;
            box-shadow: var(--shadow);
          }
          '''
          styles.write_text(css, encoding='utf-8')
          PY

          rm -rf .logo-update
          rm -f .github/workflows/apply-website-logo.yml

      - name: Commit website logo
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add justice logo to website"
          git push
