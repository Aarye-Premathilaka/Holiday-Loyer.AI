name: Refresh HolidayLawyer UI assets

on:
  push:
    paths:
      - '.github/workflows/refresh-holidaylawyer-ui.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load the redesigned styles and scripts
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          old_style = '<link rel="stylesheet" href="styles.css" />'
          new_styles = '<link rel="stylesheet" href="./styles.css?v=20260719-2" />\n  <link rel="stylesheet" href="./ai-styles.css?v=20260719-2" />'
          if old_style in html:
              html = html.replace(old_style, new_styles)
          elif 'ai-styles.css' not in html:
              html = html.replace('</head>', '  <link rel="stylesheet" href="./ai-styles.css?v=20260719-2" />\n</head>')

          html = html.replace('<script src="app.js"></script>', '<script src="./app.js?v=20260719-2"></script>')
          html = html.replace('<script src="ai.js"></script>', '<script src="./ai.js?v=20260719-2"></script>')
          html = html.replace('href="holidaylawyer-logo.jpg"', 'href="./holidaylawyer-logo.jpg"')

          path.write_text(html, encoding='utf-8')
          PY

      - name: Remove temporary workflow and commit
        run: |
          rm -f .github/workflows/refresh-holidaylawyer-ui.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/refresh-holidaylawyer-ui.yml
          git commit -m "Load redesigned HolidayLawyer interface" || exit 0
          git push
