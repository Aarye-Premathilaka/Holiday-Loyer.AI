name: Add airport autocomplete

on:
  push:
    paths:
      - '.github/workflows/add-airport-autocomplete.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connect airport autocomplete assets
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          css = '  <link rel="stylesheet" href="./airport-autocomplete.css?v=20260720-1" />'
          if css not in text:
              marker = '  <link rel="stylesheet" href="./ai-styles.css?v=20260719-2" />'
              text = text.replace(marker, marker + '\n' + css)

          script = '  <script src="./airport-autocomplete.js?v=20260720-1"></script>'
          if script not in text:
              marker = '  <script src="./ai.js?v=20260719-2"></script>'
              text = text.replace(marker, marker + '\n' + script)

          text = text.replace('placeholder="Zurich (ZRH)"', 'placeholder="Start typing: Zürich, ZRH…"')
          text = text.replace('placeholder="London (LHR)"', 'placeholder="Start typing: London, LHR…"')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit website update
        run: |
          rm .github/workflows/add-airport-autocomplete.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-airport-autocomplete.yml
          git commit -m "Enable worldwide airport autocomplete"
          git push
