name: Connect formal claim document

on:
  push:
    paths:
      - '.github/workflows/connect-formal-document.yml'

permissions:
  contents: write

jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add formal document assets
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          css = '  <link rel="stylesheet" href="./formal-document.css?v=20260720-2" />'
          if css not in s:
              marker = '  <link rel="stylesheet" href="./airport-autocomplete.css?v=20260720-1" />'
              if marker in s:
                  s = s.replace(marker, marker + '\n' + css)
              else:
                  s = s.replace('</head>', css + '\n</head>')

          js = '  <script src="./formal-document.js?v=20260720-2"></script>'
          if js not in s:
              marker = '  <script src="./airport-autocomplete.js?v=20260720-1"></script>'
              if marker in s:
                  s = s.replace(marker, marker + '\n' + js)
              else:
                  s = s.replace('</body>', js + '\n</body>')

          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit website update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Use formal blue claim document in website" || true
          git push
